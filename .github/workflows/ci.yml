name: backend-core

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mytasco
          POSTGRES_USER: mytasco
          POSTGRES_PASSWORD: mytasco
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mytasco -d mytasco"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://mytasco:mytasco@127.0.0.1:5432/mytasco
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET: ci-only-jwt-secret-with-at-least-32-bytes
      CONFIRMATION_SIGNING_KEY: ci-only-confirmation-key-with-32-bytes
      OPENAI_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: python -m compileall -q apps modules database
      - run: python scripts/check_openai_boundary.py
      - run: ruff check apps modules tests
      - run: mypy apps modules
      - run: pytest -q
