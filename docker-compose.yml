services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mytasco
      POSTGRES_USER: mytasco
      POSTGRES_PASSWORD: mytasco
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mytasco -d mytasco"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
